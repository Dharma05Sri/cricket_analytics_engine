<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Chronicles | Elite OS</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-1495090071076386" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================================
           1. ELITE SYSTEM VARIABLES & CORE
           ========================================= */
        :root {
            --bg-deep: #02040A; --panel-glass: rgba(13, 17, 28, 0.75);
            --neon-cyan: #00E5FF; --neon-emerald: #00FF88;
            --neon-crimson: #FF3366; --neon-amber: #FFB300;
            --neon-purple: #B200FF; --text-primary: #F8FAFC;
            --text-dim: #64748B; --border-glow: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% -20%, #1A233A 0%, var(--bg-deep) 80%);
            color: var(--text-primary); font-family: 'Inter', sans-serif;
            padding: 15px; min-height: 100vh; overflow-x: hidden;
        }

        /* =========================================
           2. TYPOGRAPHY & BRANDING
           ========================================= */
        .header-wrapper { text-align: center; margin-bottom: 30px; position: relative; }
        .glitch-title {
            font-family: 'Rajdhani', sans-serif; font-size: 2.8rem; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-emerald));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px;
            filter: drop-shadow(0px 0px 10px rgba(0, 229, 255, 0.3));
        }
        .sys-status {
            display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 30px;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;
            background: rgba(0, 255, 136, 0.1); color: var(--neon-emerald);
            border: 1px solid var(--neon-emerald); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 5px rgba(0,255,136,0.2); } 50% { box-shadow: 0 0 15px rgba(0,255,136,0.5); } 100% { box-shadow: 0 0 5px rgba(0,255,136,0.2); } }

        /* =========================================
           3. ADVANCED GLASSMORPHISM
           ========================================= */
        .glass-module {
            background: var(--panel-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow); border-radius: 20px;
            padding: 22px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
        }
        /* Top Accent Lines */
        .module-accent-blue { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); }
        .module-accent-red { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--neon-crimson), transparent); }

        /* =========================================
           4. NEURAL SEARCH INTERFACE
           ========================================= */
        .search-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }
        .search-input-wrapper { position: relative; }
        .search-input {
            width: 100%; padding: 18px 20px; border-radius: 14px;
            background: rgba(0, 0, 0, 0.6); color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700;
            outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        #p1-search:focus { border-color: var(--neon-cyan); box-shadow: 0 0 25px rgba(0, 229, 255, 0.3), inset 0 2px 5px rgba(0,0,0,0.5); }
        #p2-search:focus { border-color: var(--neon-crimson); box-shadow: 0 0 25px rgba(255, 51, 102, 0.3), inset 0 2px 5px rgba(0,0,0,0.5); }
        .search-label { position: absolute; top: -10px; left: 15px; background: var(--bg-deep); padding: 0 8px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; border-radius: 4px; }
        .label-blue { color: var(--neon-cyan); } .label-red { color: var(--neon-crimson); }

        /* =========================================
           5. DATA TELEMETRY & BADGES
           ========================================= */
        .role-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .role-bat { background: rgba(0, 229, 255, 0.15); color: var(--neon-cyan); border: 1px solid rgba(0, 229, 255, 0.3); }
        .role-bowl { background: rgba(255, 51, 102, 0.15); color: var(--neon-crimson); border: 1px solid rgba(255, 51, 102, 0.3); }
        .role-all { background: rgba(178, 0, 255, 0.15); color: var(--neon-purple); border: 1px solid rgba(178, 0, 255, 0.3); }
        .role-wk { background: rgba(255, 179, 0, 0.15); color: var(--neon-amber); border: 1px solid rgba(255, 179, 0, 0.3); }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-block { background: rgba(0,0,0,0.5); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 900; }
        .stat-lbl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; font-weight: 600; }
        .val-blue { color: var(--neon-cyan); } .val-red { color: var(--neon-crimson); } .val-white { color: var(--text-primary); }

        /* =========================================
           6. KINETIC POWER METERS
           ========================================= */
        .meter-wrapper { margin: 20px 0; }
        .meter-header { display: flex; justify-content: space-between; font-family: 'Inter'; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; }
        .meter-track { background: rgba(0,0,0,0.8); height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .meter-fill { height: 100%; width: 0%; transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .meter-fill::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 20px; background: rgba(255,255,255,0.4); filter: blur(5px); }
        #meter-1 { background: linear-gradient(90deg, #0044ff, var(--neon-cyan)); box-shadow: 0 0 10px rgba(0,229,255,0.5); }
        #meter-2 { background: linear-gradient(90deg, #aa0000, var(--neon-crimson)); box-shadow: 0 0 10px rgba(255,51,102,0.5); }

        /* =========================================
           7. AI TERMINAL (TYPEWRITER)
           ========================================= */
        .ai-terminal {
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(0, 255, 136, 0.3);
            border-left: 4px solid var(--neon-emerald); padding: 20px; border-radius: 10px;
            font-family: 'Inter', monospace; font-size: 0.95rem; line-height: 1.6; color: var(--neon-emerald);
            min-height: 100px; display: none; text-shadow: 0 0 5px rgba(0, 255, 136, 0.4);
        }
        .cursor { display: inline-block; width: 8px; height: 15px; background-color: var(--neon-emerald); animation: blink 1s infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <h1 class="glitch-title">CRICKET CHRONICLES</h1>
        <div class="sys-status" id="db-status"><span style="margin-right:8px;">⚡</span> UPLINKING TO VAULT...</div>
    </div>

    <div class="search-grid">
        <div class="search-input-wrapper">
            <label class="search-label label-blue">BLUE CORNER</label>
            <input type="text" id="p1-search" class="search-input" placeholder="INITIALIZE PLAYER 1..." list="player-list">
        </div>
        <div class="search-input-wrapper">
            <label class="search-label label-red">RED CORNER</label>
            <input type="text" id="p2-search" class="search-input" placeholder="INITIALIZE PLAYER 2..." list="player-list">
        </div>
        <datalist id="player-list"></datalist>
    </div>

    <div class="glass-module">
        <div class="module-accent-blue"></div>
        <h3 style="font-family: 'Rajdhani'; color: var(--text-primary); text-align: center; font-size: 1.8rem; margin-bottom: 5px;">KINETIC POWER INDEX</h3>
        
        <div class="meter-wrapper">
            <div class="meter-header"><span id="name-1" style="color:var(--neon-cyan);">PLAYER 1</span><span id="pow-1">000</span></div>
            <div class="meter-track"><div class="meter-fill" id="meter-1"></div></div>
        </div>
        <div class="meter-wrapper">
            <div class="meter-header"><span id="name-2" style="color:var(--neon-crimson);">PLAYER 2</span><span id="pow-2">000</span></div>
            <div class="meter-track"><div class="meter-fill" id="meter-2"></div></div>
        </div>
    </div>

    <div class="glass-module" id="stats-panel" style="display: none;">
        
        <div style="margin-bottom: 30px;">
            <div id="role-1" class="role-badge role-bat">ROLE UNKNOWN</div>
            <div class="stat-grid">
                <div class="stat-block"><div class="stat-val val-blue" id="r-1">0</div><div class="stat-lbl">Runs</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="a-1">0</div><div class="stat-lbl">Average</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="w-1">0</div><div class="stat-lbl">Wickets</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="e-1">0</div><div class="stat-lbl">Economy</div></div>
            </div>
        </div>

        <div>
            <div id="role-2" class="role-badge role-bowl">ROLE UNKNOWN</div>
            <div class="stat-grid">
                <div class="stat-block"><div class="stat-val val-red" id="r-2">0</div><div class="stat-lbl">Runs</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="a-2">0</div><div class="stat-lbl">Average</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="w-2">0</div><div class="stat-lbl">Wickets</div></div>
                <div class="stat-block"><div class="stat-val val-white" id="e-2">0</div><div class="stat-lbl">Economy</div></div>
            </div>
        </div>
    </div>

    <div class="glass-module" style="position: relative; height: 350px;">
        <div class="module-accent-red"></div>
        <canvas id="radarChart"></canvas>
    </div>

    <div class="glass-module">
        <h3 style="font-family: 'Rajdhani'; color: var(--neon-emerald); font-size: 1.5rem; margin-bottom: 15px;">🤖 NEURAL PREDICTION ENGINE</h3>
        <div id="ai-terminal" class="ai-terminal">
            <span id="ai-text"></span><span class="cursor"></span>
        </div>
    </div>

    <script>
        let globalDatabase = {};
        let lowerCaseDB = {};
        let radarChartInstance = null;
        let selectedP1 = null; let selectedP2 = null;
        let typeWriterTimeout = null;

        // 1. SECURE DATABASE UPLINK
        async function fetchDatabase() {
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error("Vault Offline");
                
                globalDatabase = await response.json();
                const dataList = document.getElementById('player-list');
                const playerCount = Object.keys(globalDatabase).length;
                
                for (let player in globalDatabase) {
                    lowerCaseDB[player.toLowerCase()] = { name: player, data: globalDatabase[player] };
                    let option = document.createElement('option');
                    option.value = player;
                    dataList.appendChild(option);
                }

                const statusBadge = document.getElementById('db-status');
                statusBadge.innerHTML = `<span style="margin-right:8px;">✓</span> SYSTEM SECURED : ${playerCount} ENTITIES`;
                statusBadge.style.color = "var(--bg-deep)";
                statusBadge.style.background = "var(--neon-emerald)";
                statusBadge.style.animation = "none";
                statusBadge.style.boxShadow = "0 0 15px rgba(0,255,136,0.6)";

                setupEventListeners();
            } catch (error) {
                const statusBadge = document.getElementById('db-status');
                statusBadge.innerHTML = `⚠️ CRITICAL ERROR: database.json MALFORMED`;
                statusBadge.style.color = "var(--bg-deep)";
                statusBadge.style.background = "var(--neon-crimson)";
                statusBadge.style.borderColor = "var(--neon-crimson)";
                statusBadge.style.animation = "none";
            }
        }

        // 2. SEARCH EVENT LISTENERS
        function setupEventListeners() {
            const input1 = document.getElementById('p1-search');
            const input2 = document.getElementById('p2-search');

            input1.addEventListener('input', (e) => {
                const searchVal = e.target.value.toLowerCase();
                if (lowerCaseDB[searchVal]) {
                    selectedP1 = lowerCaseDB[searchVal].name;
                    updateUI(1, selectedP1); checkMasterSystems();
                }
            });

            input2.addEventListener('input', (e) => {
                const searchVal = e.target.value.toLowerCase();
                if (lowerCaseDB[searchVal]) {
                    selectedP2 = lowerCaseDB[searchVal].name;
                    updateUI(2, selectedP2); checkMasterSystems();
                }
            });
        }

        // 3. UI RENDERER & ROLE BADGE ASSIGNER
        function getRoleClass(role) {
            const r = role.toLowerCase();
            if (r.includes('wicket')) return 'role-wk';
            if (r.includes('all')) return 'role-all';
            if (r.includes('bowl')) return 'role-bowl';
            return 'role-bat';
        }

        function updateUI(num, playerName) {
            const data = globalDatabase[playerName];
            document.getElementById(`name-${num}`).innerText = playerName;
            document.getElementById(`pow-${num}`).innerText = (data.Power || 0);
            document.getElementById(`meter-${num}`).style.width = (data.Power || 0) + "%";
            
            const roleBadge = document.getElementById(`role-${num}`);
            roleBadge.innerText = (data.Role || "UNKNOWN").toUpperCase();
            roleBadge.className = `role-badge ${getRoleClass(data.Role || "Batsman")}`;

            document.getElementById(`r-${num}`).innerText = data.Runs || 0;
            document.getElementById(`a-${num}`).innerText = data.Average || 0;
            document.getElementById(`w-${num}`).innerText = data.Wickets || 0;
            document.getElementById(`e-${num}`).innerText = data.Economy || 0;
            document.getElementById('stats-panel').style.display = 'block';
        }

        function checkMasterSystems() {
            if (selectedP1 && selectedP2) {
                const d1 = globalDatabase[selectedP1]; const d2 = globalDatabase[selectedP2];
                renderRadar(selectedP1, d1, selectedP2, d2); 
                calculateAI(selectedP1, d1, selectedP2, d2);
            }
        }

        // 4. CHART.JS HARDWARE RENDERING
        function renderRadar(p1, d1, p2, d2) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const b_rate_1 = Math.min(100, ((d1.Wickets || 0) / 5) + Math.max(0, (5 - (d1.Economy || 5)) * 10));
            const b_rate_2 = Math.min(100, ((d2.Wickets || 0) / 5) + Math.max(0, (5 - (d2.Economy || 5)) * 10));

            const data = {
                labels: ['Batting Avg', 'Strike Rate', 'Bowling Matrix', 'Power Index'],
                datasets: [
                    { label: p1, data: [d1.Average || 0, d1.StrikeRate || 0, b_rate_1, d1.Power || 0], backgroundColor: 'rgba(0, 229, 255, 0.25)', borderColor: '#00E5FF', borderWidth: 2, pointBackgroundColor: '#00E5FF' },
                    { label: p2, data: [d2.Average || 0, d2.StrikeRate || 0, b_rate_2, d2.Power || 0], backgroundColor: 'rgba(255, 51, 102, 0.25)', borderColor: '#FF3366', borderWidth: 2, pointBackgroundColor: '#FF3366' }
                ]
            };
            if (radarChartInstance) radarChartInstance.destroy();
            radarChartInstance = new Chart(ctx, { 
                type: 'radar', data: data, 
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { r: { angleLines: { color: 'rgba(255,255,255,0.05)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#64748B', font: { family: 'Rajdhani', size: 13, weight: 'bold' } }, ticks: { display: false, max: 120 } } },
                    plugins: { legend: { position: 'bottom', labels: { color: '#F8FAFC', font: { family: 'Inter', size: 12 } } } }
                } 
            });
        }

        // 5. AI NEURAL TYPEWRITER EFFECT
        function typeWriter(text, elementId, speed) {
            if (typeWriterTimeout) clearTimeout(typeWriterTimeout);
            let i = 0;
            document.getElementById(elementId).innerHTML = '';
            function type() {
                if (i < text.length) {
                    // Handle HTML line breaks
                    if(text.charAt(i) === '<' && text.substring(i, i+4) === '<br>') {
                        document.getElementById(elementId).innerHTML += '<br>'; i += 4;
                    } else {
                        document.getElementById(elementId).innerHTML += text.charAt(i); i++;
                    }
                    typeWriterTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        function calculateAI(p1, d1, p2, d2) {
            const terminal = document.getElementById('ai-terminal');
            terminal.style.display = 'block';
            const p1_bat = ((d1.Average || 0) * (d1.StrikeRate || 0)) / 100;
            const p2_bowl = (d2.Wickets || 0) / ((d2.Economy || 1) + 0.1);

            let finalText = "";
            if ((d2.Wickets || 0) < 5) {
                finalText = `[ SYSTEM HALT ]<br>${p2.toUpperCase()} lacks required bowling telemetry for accurate combat simulation.`;
                terminal.style.borderLeftColor = "var(--neon-amber)";
                terminal.style.color = "var(--neon-amber)";
            } else if ((d1.Runs || 0) < 100) {
                finalText = `[ SYSTEM HALT ]<br>${p1.toUpperCase()} lacks required batting telemetry for accurate combat simulation.`;
                terminal.style.borderLeftColor = "var(--neon-amber)";
                terminal.style.color = "var(--neon-amber)";
            } else if (p1_bat > p2_bowl) {
                finalText = `[ PREDICTION: ${p1.toUpperCase()} DOMINATES ]<br>Executing 6-ball simulation algorithm...<br>Result: ${p1}'s aggression matrix statistically overrides ${p2}'s defensive economy parameters.`;
                terminal.style.borderLeftColor = "var(--neon-cyan)";
                terminal.style.color = "var(--neon-cyan)";
            } else {
                finalText = `[ PREDICTION: ${p2.toUpperCase()} DOMINATES ]<br>Executing 6-ball simulation algorithm...<br>Result: ${p2}'s wicket-taking probability successfully restricts ${p1}'s run velocity.`;
                terminal.style.borderLeftColor = "var(--neon-crimson)";
                terminal.style.color = "var(--neon-crimson)";
            }

            typeWriter(finalText, 'ai-text', 20); // 20ms per letter typing speed
        }

        // BOOT SYSTEM
        window.onload = fetchDatabase;
    </script>
</body>
</html>
